version: '3.8'

services:
  # FastAPI Backend
  backend:
    build: .
    container_name: compliance-backend
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - DATABASE_URL=postgresql://postgres:password@db:5432/compliance_db
      - QDRANT_URL=http://qdrant:6333
    env_file:
      - .env
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    depends_on:
      - db
      - qdrant
    command: python main.py
    networks:
      - compliance-network

  # Streamlit Frontend
  frontend:
    build: .
    container_name: compliance-frontend
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://backend:8000
    volumes:
      - ./src:/app/src
      - ./streamlit_app.py:/app/streamlit_app.py
    depends_on:
      - backend
    command: streamlit run streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    networks:
      - compliance-network

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: compliance-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=compliance_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - compliance-network

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: compliance-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - compliance-network

volumes:
  postgres_data:
  qdrant_data:

networks:
  compliance-network:
    driver: bridge