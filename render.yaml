# Bifrost — Render Blueprint (STAGING/DEMO ONLY)
#
# ⚠️  VIGTIG ADVARSEL: Denne config er KUN til staging/demo med dummy-data.
#     IKKE til produktion med rigtig kommunal persondata.
#
# Hvorfor IKKE produktion:
#   1. Render = US-firma (EU-region findes men kræver databehandleraftale)
#   2. LM Studio kan ikke køre her → tvunget til Azure/OpenAI = data forlader kommunens kontrol
#   3. DPIA-dokument forudsætter Mac Studio + Tailscale, ikke cloud
#   4. Render's free tier sover efter 15 min inaktivitet (ikke kontinuerlig drift)
#
# Brug i stedet:
#   - PRODUKTION: Mac Studio + Tailscale (se docs/SETUP_NEW_MAC.md)
#   - STAGING/DEMO: denne render.yaml (kun dummy-data)
#
# Setup:
#   1. Push denne fil til main
#   2. Render Dashboard → New → Blueprint
#   3. Vælg dette repo
#   4. Sæt secret env vars:
#      - OPENAI_API_KEY (kræves — LM Studio findes ikke på Render)
#      - SMTP_PASSWORD (valgfri)
#   5. Deploy
#
# Resultat:
#   - Backend FastAPI på https://bifrost-staging-api.onrender.com
#   - Frontend statisk site på https://bifrost-staging.onrender.com
#   - Managed Postgres med 1 GB free tier

services:
  # ---- Backend FastAPI ---------------------------------------------------
  - type: web
    name: bifrost-staging-api
    runtime: python
    region: frankfurt  # EU-region (men stadig US-firma juridisk)
    plan: starter  # $7/måned — free tier sover for hurtigt
    branch: main
    rootDir: .
    buildCommand: |
      pip install -r requirements.txt
      alembic upgrade head
    startCommand: |
      uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Database — auto-linked til managed Postgres nedenunder
      - key: DATABASE_URL
        fromDatabase:
          name: bifrost-staging-db
          property: connectionString

      # LLM — Render har ikke GPU → OpenAI/Azure er eneste valg
      - key: OPENAI_API_KEY
        sync: false  # MAN udfylder dette i Render Dashboard

      - key: DEFAULT_LLM_MODEL
        value: gpt-4o-mini  # billigste OpenAI-model med god kvalitet

      # Strict config-validation = false så app starter selv hvis SMTP mangler
      - key: STRICT_CONFIG_VALIDATION
        value: "false"

      # Frontend-link så CORS + redirects virker
      - key: FRONTEND_URL
        value: https://bifrost-staging.onrender.com

      # Demo-flag: brug PII-redaction strict-mode + advarsel i UI
      - key: BIFROST_ENV
        value: staging

      # Notification digest: deaktiver (ingen rigtige modtagere)
      - key: NOTIFICATION_DIGEST_ENABLED
        value: "false"

      # SMTP — valgfri, kun hvis du vil teste mail-flow
      - key: SMTP_HOST
        sync: false

      - key: SMTP_PORT
        value: "587"

      - key: SMTP_USE_TLS
        value: "true"

      - key: SMTP_USER
        sync: false

      - key: SMTP_PASSWORD
        sync: false

      # Python version
      - key: PYTHON_VERSION
        value: 3.11.10

  # ---- Frontend statisk site ---------------------------------------------
  - type: web
    name: bifrost-staging
    runtime: static
    region: frankfurt
    plan: free  # statisk content kan godt være free
    branch: main
    rootDir: frontend
    buildCommand: |
      npm install && DISABLE_ESLINT_PLUGIN=true npm run build
    staticPublishPath: ./build
    autoDeploy: true
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: same-origin
    routes:
      # SPA-fallback — alle ukendte routes går til index.html
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_BASE_URL
        value: https://bifrost-staging-api.onrender.com
      - key: REACT_APP_ENV
        value: staging

databases:
  # ---- Managed PostgreSQL ------------------------------------------------
  - name: bifrost-staging-db
    region: frankfurt
    plan: free  # 1 GB / 90 dages levetid
    databaseName: bifrost
    user: bifrost
    # Note: free-tier Postgres slettes efter 90 dage uden aktivitet.
    # For longer-running staging: opgrader til starter ($7/måned)
