id: forvaltningsloven.par22.begrundelsespligt
kilde:
  lov: "Forvaltningsloven (lovbekendtgørelse nr. 433 af 22. april 2014 med senere ændringer)"
  artikel: "§ 22"
  citat: "En afgørelse skal, når den meddeles skriftligt, være ledsaget af en begrundelse, medmindre afgørelsen fuldt ud giver den pågældende part medhold."
  url: "https://www.retsinformation.dk/eli/lta/2014/433"
  sidst_verificeret: "2026-05-07"

trigger:
  any_of:
    - signal: system.is_used_by_public_authority
    - signal: system.makes_administrative_decisions

predikater:
  - id: traeffer_afgoerelse
    spørgsmål: "Træffer systemet en forvaltningsafgørelse over for en borger eller virksomhed?"
    type: boolean
    hjælp: |
      En forvaltningsafgørelse er en udtalelse der fastsætter, hvad der er eller skal være ret i et konkret foreliggende tilfælde over for en bestemt person/virksomhed.
      Eksempler: tilkendelse/afslag på ydelse, tilladelse, sanktion, indsats.
      IKKE afgørelser: råd, vejledning, faktisk forvaltningsvirksomhed.

  - id: meddeles_skriftligt
    spørgsmål: "Meddeles afgørelsen skriftligt (brev, e-Boks, e-mail, digitalt brev)?"
    type: boolean
    hjælp: "Begrundelsespligten gælder kun skriftlige afgørelser. Mundtlige afgørelser kan dog kræve skriftlig begrundelse hvis parten anmoder om det inden 14 dage (§ 23)."

  - id: fuld_medhold
    spørgsmål: "Giver afgørelsen fuld medhold til parten (parten får 100% det de søgte)?"
    type: boolean
    hjælp: "Hvis fuld medhold = ingen begrundelseskrav. Ved delvis medhold/afslag = begrundelseskrav."

  - id: kan_systemet_generere_begrundelse
    spørgsmål: "Kan AI-systemet selv generere en lovlig begrundelse, der opfylder § 24 (henvisning til retsregler, hovedhensyn ved skøn, faktiske omstændigheder)?"
    type: enum
    enum_values: [ja_fuldt, ja_delvist, nej]
    hjælp: |
      § 24 stiller krav om at begrundelsen indeholder:
      (1) henvisning til de retsregler afgørelsen er truffet efter,
      (2) angivelse af hovedhensynene ved skønsudøvelse,
      (3) angivelse af de faktiske omstændigheder af væsentlig betydning.

afgørelse:
  hvis: "traeffer_afgoerelse AND meddeles_skriftligt AND NOT fuld_medhold"
  så:
    status: BETINGET-GO
    begrundelse: "Systemet træffer skriftlige afgørelser uden fuldt medhold. § 22 udløser begrundelseskrav, og § 24 kræver konkret indhold i begrundelsen."
    krav:
      - "AI-genereret begrundelse skal verificeres af kompetent sagsbehandler INDEN afsendelse"
      - "Begrundelsen skal indeholde retsregelhenvisning (§ 24, stk. 1)"
      - "Ved skønsudøvelse: angiv hovedhensyn (§ 24, stk. 1)"
      - "Angiv faktiske omstændigheder af væsentlig betydning (§ 24, stk. 2)"
      - "Sikr at AI ikke 'opfinder' lovhenvisninger — alle paragraffer skal være verificerbare"
      - "Etablér klagevejledning (§ 25) i samme dokument"
    evidens_påkrævet:
      - sagsbehandler_review_protokol
      - begrundelsesskabelon_godkendt_af_jurist
      - procedure_til_lovhenvisnings_verifikation
      - klagevejledning_skabelon
  ellers:
    status: GO
    begrundelse: "Systemet er ikke omfattet af § 22 — enten træffes ikke afgørelser, kun mundtlige beskeder, eller fuldt medhold."
    krav: []
    evidens_påkrævet: []

llm_fortolkning:
  rolle: "Du fortolker fritekst-beskrivelse til at foreslå hvilke trigger-signaler der matcher. Du må IKKE selv vurdere begrundelsespligten — det gør reglen baseret på sagsbehandlerens svar."
  prompt_template: |
    System-beskrivelse:
    {system_beskrivelse}

    For hvert af følgende signaler, returnér true, false eller "usikker":
    - system.is_used_by_public_authority
    - system.makes_administrative_decisions

    Returnér KUN gyldig JSON.

metadata:
  forfatter: "Forseti core team"
  version: "1.0.0"
  tags: ["forvaltningsloven", "begrundelsespligt", "kommunal"]
